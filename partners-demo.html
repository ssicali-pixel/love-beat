<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partners</title>
  <style>
    /* ── Customize: change any of these three blocks ── */
    :root {
      --bg:           #0a0a0a;
      --label:        rgba(255,255,255,0.45);
      --ecg-stroke:   rgba(255,255,255,0.30);
      --card-bg:      #ffffff;
      --shadow-idle:  0 2px 10px rgba(0,0,0,0.18);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.40);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .partners {
      width: 100%;
      max-width: 960px;
      padding: 3.5rem 2rem 2.5rem;
    }

    .partners-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--label);
      margin-bottom: 2.5rem;
    }

    .cards-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
      min-height: 110px;
    }

    /* ── Card base state: invisible, no layout disruption ── */
    .card {
      width: 160px;
      height: 90px;
      border-radius: 12px;
      background: var(--card-bg);
      box-shadow: var(--shadow-idle);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      opacity: 0;
    }

    .card.placed {
      opacity: 1;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .card.placed:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .card img {
      max-width: 100px;
      max-height: 44px;
      object-fit: contain;
    }

    .card .fallback {
      display: none;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      text-align: center;
    }

    /* ── Entry animations: shoot in from edge, spring overshoot ── */
    @keyframes enter-left {
      0%   { transform: translateX(-110vw) scale(1);    opacity: 0; }
      62%  { transform: translateX(5px)    scale(1.06); opacity: 1; }
      80%  { transform: translateX(-2px)   scale(1.02);             }
      100% { transform: translateX(0)      scale(1);    opacity: 1; }
    }

    @keyframes enter-right {
      0%   { transform: translateX(110vw)  scale(1);    opacity: 0; }
      62%  { transform: translateX(-5px)   scale(1.06); opacity: 1; }
      80%  { transform: translateX(2px)    scale(1.02);             }
      100% { transform: translateX(0)      scale(1);    opacity: 1; }
    }

    .card.entering-left  { animation: enter-left  260ms ease-out forwards; }
    .card.entering-right { animation: enter-right 260ms ease-out forwards; }

    /* ── Idle pulse (fires on placed cards after all are shown) ── */
    @keyframes idle-pulse {
      0%   { transform: scale(1);    box-shadow: var(--shadow-idle); }
      38%  { transform: scale(1.03); box-shadow: 0 4px 18px rgba(160,160,160,0.22); }
      100% { transform: scale(1);    box-shadow: var(--shadow-idle); }
    }

    .card.pulsing { animation: idle-pulse 360ms ease-out forwards !important; }

    /* ── ECG canvas strip ── */
    #ecg-canvas {
      display: block;
      width: 100%;
      height: 60px;
    }

    @media (max-width: 600px) {
      .card { width: calc(50% - 8px); max-width: 160px; }
    }
  </style>
</head>
<body>

<section class="partners" aria-label="Partners">
  <p class="partners-label">Partners</p>
  <div class="cards-row" id="cards-row" role="list"></div>
  <canvas id="ecg-canvas" aria-hidden="true"></canvas>
</section>

<script>
  /* ══════════════════════════════════════════
     EDIT THESE — partners list and timing
  ══════════════════════════════════════════ */
  const PARTNERS = [
    { name: 'Stripe',     domain: 'stripe.com'    },
    { name: 'Vercel',     domain: 'vercel.com'     },
    { name: 'Supabase',   domain: 'supabase.com'   },
    { name: 'Cloudflare', domain: 'cloudflare.com' },
    { name: 'Linear',     domain: 'linear.app'     },
  ];

  const PERIOD_MS   = 1600;  // ms per heartbeat cycle
  const R_PEAK_FRAC = 0.40;  // position of R-peak within the cycle (0–1)

  /* ══════════════════════════════════════════
     ECG waveform shape
     Each entry: [phase_fraction, normalised_y]
     y = 0 → baseline, y = -1 → peak up, y > 0 → dip down
  ══════════════════════════════════════════ */
  const ECG_SHAPE = [
    [0.00,  0.00],
    [0.12,  0.00],
    [0.16, -0.18],           // P wave
    [0.20,  0.00],
    [0.30,  0.00],
    [0.37,  0.10],           // Q dip
    [R_PEAK_FRAC, -1.00],    // R peak  ← heartbeat event fires here
    [0.45,  0.14],           // S dip
    [0.49,  0.00],
    [0.57,  0.00],
    [0.64, -0.27],           // T wave
    [0.74,  0.00],
    [1.00,  0.00],
  ];

  function ecgY(phase) {
    phase = ((phase % 1) + 1) % 1;
    for (let i = 0; i < ECG_SHAPE.length - 1; i++) {
      const [t0, y0] = ECG_SHAPE[i];
      const [t1, y1] = ECG_SHAPE[i + 1];
      if (phase >= t0 && phase <= t1) {
        return y0 + ((phase - t0) / (t1 - t0)) * (y1 - y0);
      }
    }
    return 0;
  }

  /* ══════════════════════════════════════════
     initECG — canvas drawing + heartbeat dispatch
     The heartbeat custom event is the single source of truth for timing.
     The ECG fires it; cards listen.
  ══════════════════════════════════════════ */
  function initECG() {
    const canvas = document.getElementById('ecg-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const strokeColor = getComputedStyle(document.documentElement)
      .getPropertyValue('--ecg-stroke').trim() || 'rgba(255,255,255,0.30)';

    let startTime     = null;
    let lastBeatCycle = -1;

    function draw(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const cycle   = Math.floor(elapsed / PERIOD_MS);
      const phase   = (elapsed % PERIOD_MS) / PERIOD_MS;

      /* Fire once per cycle when the R-peak phase is crossed */
      if (phase >= R_PEAK_FRAC && cycle > lastBeatCycle) {
        lastBeatCycle = cycle;
        document.dispatchEvent(new CustomEvent('heartbeat'));
      }

      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const baseline  = H * 0.72;
      const amplitude = H * 0.65;
      const VISIBLE   = 2.2;  // how many cycles fit on screen at once

      ctx.beginPath();
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = 'round';
      ctx.lineCap     = 'round';

      /* Right edge = now; left edge = VISIBLE cycles in the past */
      const STEPS = Math.max(W, 200);
      for (let i = 0; i <= STEPS; i++) {
        const x     = (i / STEPS) * W;
        const msAgo = ((STEPS - i) / STEPS) * VISIBLE * PERIOD_MS;
        const t     = elapsed - msAgo;

        if (t < 0) {
          i === 0 ? ctx.moveTo(x, baseline) : ctx.lineTo(x, baseline);
          continue;
        }

        const p = (t % PERIOD_MS) / PERIOD_MS;
        const y = baseline - ecgY(p) * amplitude;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }

      ctx.stroke();
      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  }

  /* ══════════════════════════════════════════
     initCards — build DOM, then wire to heartbeat
  ══════════════════════════════════════════ */
  function initCards() {
    const row   = document.getElementById('cards-row');
    const cards = PARTNERS.map(({ name, domain }) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('role', 'listitem');
      card.setAttribute('aria-label', name);

      const img = document.createElement('img');
      img.src   = `https://logo.clearbit.com/${domain}`;
      img.alt   = name;

      const fallback       = document.createElement('span');
      fallback.className   = 'fallback';
      fallback.textContent = name;

      img.onerror = () => {
        img.style.display      = 'none';
        fallback.style.display = 'block';
      };

      card.append(img, fallback);
      row.appendChild(card);
      return card;
    });

    onHeartbeat(cards);
  }

  /* ══════════════════════════════════════════
     onHeartbeat — card entry sequence, then idle pulses
  ══════════════════════════════════════════ */
  function onHeartbeat(cards) {
    let nextIndex = 0;
    let fromLeft  = true;

    document.addEventListener('heartbeat', () => {
      if (nextIndex < cards.length) {
        /* Shoot the next card in from alternating sides */
        const card = cards[nextIndex];
        const cls  = fromLeft ? 'entering-left' : 'entering-right';

        card.classList.add(cls);
        card.addEventListener('animationend', () => {
          card.classList.remove(cls);
          card.classList.add('placed');
        }, { once: true });

        nextIndex++;
        fromLeft = !fromLeft;

      } else {
        /* All placed — pulse a random card */
        const placed = cards.filter(c => c.classList.contains('placed'));
        if (!placed.length) return;

        const target = placed[Math.floor(Math.random() * placed.length)];
        if (target.classList.contains('pulsing')) return;

        target.classList.add('pulsing');
        target.addEventListener('animationend', () => {
          target.classList.remove('pulsing');
        }, { once: true });
      }
    });
  }

  /* ── Boot ── */
  initECG();
  initCards();
</script>
</body>
</html>
