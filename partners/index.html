<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partners</title>
  <style>

/* ═══════════════════════════════════════════════
   ① COLORI — modifica qui
═══════════════════════════════════════════════ */
:root {
  --bg:          #0a0a0a;
  --label:       rgba(255, 255, 255, 0.40);
  --ecg:         rgba(255, 255, 255, 0.28);
  --card-bg:     #ffffff;
  --shadow:      0 2px 12px rgba(0, 0, 0, 0.13);
  --shadow-hov:  0 8px 32px rgba(0, 0, 0, 0.34);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── sezione ── */
.wrap {
  width: 100%;
  max-width: 980px;
  padding: 4rem 2rem 3rem;
}

.section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--label);
  margin-bottom: 2.75rem;
}

/* ── griglia card ── */
.cards {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  min-height: 90px;
  margin-bottom: 2rem;
}

/* ── singola card ── */
.card {
  width: 160px;
  height: 90px;
  border-radius: 12px;
  background: var(--card-bg);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
  /* nascosta finché non viene animata */
  opacity: 0;
  pointer-events: none;
}

.card.placed {
  opacity: 1;
  pointer-events: auto;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.card.placed:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hov);
}

.card img {
  max-width: 100px;
  max-height: 44px;
  width: auto;
  height: auto;
  object-fit: contain;
}

.card .fallback {
  display: none;
  font-size: 12px;
  font-weight: 600;
  color: #222;
  text-align: center;
  line-height: 1.35;
}

/* ── animazioni entrata ──────────────────────────────────────
   Durata totale 200ms:
     0→75% (150ms) : translateX da offscreen a 0, ease-out
     75→100%(50ms) : scale 1.06 → 1.0, bounce settle
──────────────────────────────────────────────────────────── */
@keyframes enter-left {
  0%   { transform: translateX(-110vw) scale(1.00); opacity: 0; }
  75%  { transform: translateX(0)      scale(1.06); opacity: 1; }
  100% { transform: translateX(0)      scale(1.00); opacity: 1; }
}

@keyframes enter-right {
  0%   { transform: translateX(110vw)  scale(1.00); opacity: 0; }
  75%  { transform: translateX(0)      scale(1.06); opacity: 1; }
  100% { transform: translateX(0)      scale(1.00); opacity: 1; }
}

.card.entering-left  { animation: enter-left  200ms ease-out forwards; }
.card.entering-right { animation: enter-right 200ms ease-out forwards; }

/* ── pulse idle (card random dopo che tutte sono arrivate) ── */
@keyframes idle-pulse {
  0%   { transform: scale(1.00); box-shadow: var(--shadow); }
  35%  { transform: scale(1.04); box-shadow: 0 5px 22px rgba(130,130,130,0.20); }
  100% { transform: scale(1.00); box-shadow: var(--shadow); }
}

/* !important per avere precedenza sulla transition di .placed */
.card.pulsing { animation: idle-pulse 400ms ease-out forwards !important; }

/* ── striscia ECG ── */
.ecg-wrap {
  width: 100%;
  height: 60px;
  -webkit-mask-image: linear-gradient(to right, transparent, #000 6%, #000 94%, transparent);
          mask-image: linear-gradient(to right, transparent, #000 6%, #000 94%, transparent);
}

#ecg-canvas {
  display: block;
  width: 100%;
  height: 60px;
}

/* ── responsive ── */
@media (max-width: 600px) {
  .card {
    width: calc(50% - 8px);
    max-width: 160px;
  }
}

  </style>
</head>
<body>

<div class="wrap">
  <p class="section-label">Partners</p>
  <div class="cards" id="cards" role="list"></div>
  <div class="ecg-wrap">
    <canvas id="ecg-canvas" aria-hidden="true"></canvas>
  </div>
</div>

<script>

/* ═══════════════════════════════════════════════
   ② PARTNER — modifica qui
   Aggiungi o rimuovi righe, cambia nome e dominio.
═══════════════════════════════════════════════ */
const PARTNERS = [
  { name: 'Stripe',     domain: 'stripe.com'    },
  { name: 'Vercel',     domain: 'vercel.com'     },
  { name: 'Supabase',   domain: 'supabase.com'   },
  { name: 'Cloudflare', domain: 'cloudflare.com' },
  { name: 'Linear',     domain: 'linear.app'     },
];

/* ── timing ECG ─────────────────────────────────
   PERIOD_MS : durata di un ciclo in millisecondi
               1000 = 60 bpm | 1600 = ~37 bpm (più drammatico)
   R_PEAK    : frazione del ciclo in cui cade lo spike-R (0–1)
              questo momento triggera l'evento 'heartbeat'
────────────────────────────────────────────────── */
const PERIOD_MS = 1600;
const R_PEAK    = 0.40;

/* ═══════════════════════════════════════════════
   Forma dell'onda ECG (PQRST)
   [fase 0–1, y normalizzata]
     y =  0.00  → baseline
     y = -1.00  → picco verso l'alto (R spike)
     y = +0.xx  → avvallamento verso il basso
═══════════════════════════════════════════════ */
const ECG_SHAPE = [
  [0.00,  0.00],
  [0.11,  0.00],
  [0.15, -0.16],        // onda P (su)
  [0.19,  0.00],
  [0.28,  0.00],
  [0.36,  0.11],        // onda Q (giù)
  [R_PEAK, -1.00],      // ← R spike — heartbeat event
  [0.44,  0.15],        // onda S (giù)
  [0.49,  0.00],
  [0.56,  0.00],
  [0.63, -0.26],        // onda T (su)
  [0.73,  0.00],
  [1.00,  0.00],
];

/* interpolazione lineare tra i punti della forma */
function ecgSample(phase) {
  phase = ((phase % 1) + 1) % 1;
  for (let i = 0; i < ECG_SHAPE.length - 1; i++) {
    const [t0, y0] = ECG_SHAPE[i];
    const [t1, y1] = ECG_SHAPE[i + 1];
    if (phase >= t0 && phase <= t1) {
      return y0 + ((phase - t0) / (t1 - t0)) * (y1 - y0);
    }
  }
  return 0;
}

/* ═══════════════════════════════════════════════
   initECG()
   Disegna la waveform PQRST su canvas con
   requestAnimationFrame, scorrendola da destra
   verso sinistra (bordo destro = "adesso").
   Lancia un CustomEvent('heartbeat') ogni volta
   che la fase dello spike-R viene attraversata.
   L'evento è l'unica sorgente di timing — le
   card lo ascoltano, l'ECG lo genera.
═══════════════════════════════════════════════ */
function initECG() {
  const canvas = document.getElementById('ecg-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const strokeColor = getComputedStyle(document.documentElement)
    .getPropertyValue('--ecg').trim() || 'rgba(255,255,255,0.28)';

  let startTs   = null;
  let lastCycle = -1;

  function frame(ts) {
    if (!startTs) startTs = ts;
    const elapsed = ts - startTs;
    const cycle   = Math.floor(elapsed / PERIOD_MS);
    const phase   = (elapsed % PERIOD_MS) / PERIOD_MS;

    /* lancia heartbeat una sola volta per ciclo, al picco R */
    if (phase >= R_PEAK && cycle > lastCycle) {
      lastCycle = cycle;
      document.dispatchEvent(new CustomEvent('heartbeat'));
    }

    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const baseline  = H * 0.72;
    const amplitude = H * 0.65;
    const VISIBLE   = 2.2;         /* cicli visibili contemporaneamente */
    const STEPS     = Math.max(W, 300);

    ctx.beginPath();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth   = 1.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';

    for (let i = 0; i <= STEPS; i++) {
      const x        = (i / STEPS) * W;
      /* pixel a sinistra = ms nel passato */
      const msInPast = ((STEPS - i) / STEPS) * VISIBLE * PERIOD_MS;
      const t        = elapsed - msInPast;

      if (t < 0) {
        i === 0 ? ctx.moveTo(x, baseline) : ctx.lineTo(x, baseline);
        continue;
      }

      const p = (t % PERIOD_MS) / PERIOD_MS;
      const y = baseline - ecgSample(p) * amplitude;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }

    ctx.stroke();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

/* ═══════════════════════════════════════════════
   initCards()
   Costruisce il DOM delle card dall'array PARTNERS
   e registra il logo Clearbit con fallback testuale.
═══════════════════════════════════════════════ */
function initCards() {
  const row   = document.getElementById('cards');
  const cards = PARTNERS.map(({ name, domain }) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('role', 'listitem');
    card.setAttribute('aria-label', name);

    const img = document.createElement('img');
    img.src   = `https://logo.clearbit.com/${domain}`;
    img.alt   = name;

    const fallback       = document.createElement('span');
    fallback.className   = 'fallback';
    fallback.textContent = name;

    /* se il logo non carica mostra il nome */
    img.onerror = () => {
      img.remove();
      fallback.style.display = 'block';
    };

    card.append(img, fallback);
    row.appendChild(card);
    return card;
  });

  onHeartbeat(cards);
}

/* ═══════════════════════════════════════════════
   onHeartbeat(cards)
   Fase 1 — entrata: ad ogni battito spara la
             prossima card da sinistra o destra,
             alternando.
   Fase 2 — idle: una volta piazzate tutte, ogni
             battito fa un pulse su una card random.
═══════════════════════════════════════════════ */
function onHeartbeat(cards) {
  let next     = 0;
  let fromLeft = true;

  document.addEventListener('heartbeat', () => {

    /* ── fase 1: entrata sequenziale ── */
    if (next < cards.length) {
      const card = cards[next];
      const cls  = fromLeft ? 'entering-left' : 'entering-right';

      card.classList.add(cls);

      card.addEventListener('animationend', () => {
        card.classList.remove(cls);
        card.classList.add('placed');
      }, { once: true });

      next++;
      fromLeft = !fromLeft;
      return;
    }

    /* ── fase 2: pulse idle su card random ── */
    const placed = cards.filter(c => c.classList.contains('placed'));
    if (!placed.length) return;

    const target = placed[Math.floor(Math.random() * placed.length)];
    if (target.classList.contains('pulsing')) return;   /* evita sovrapposizioni */

    target.classList.add('pulsing');
    target.addEventListener('animationend', () => {
      target.classList.remove('pulsing');
    }, { once: true });
  });
}

/* ── avvio ── */
initECG();
initCards();

</script>
</body>
</html>
